<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - Mazuri</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/navbar.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo"><a href="dashboard.html">Mazuri</a></div>
      <ul class="nav-menu">
        <li class="nav-item"><a href="dashboard.html" class="nav-link">Dashboard</a></li>
        <li class="nav-item"><a href="collections.html" class="nav-link">Collections</a></li>
        <li class="nav-item"><a href="schedules.html" class="nav-link">Schedules</a></li>
        <li class="nav-item"><a href="disposal.html" class="nav-link">Disposal</a></li>
        <li class="nav-item"><a href="reports.html" class="nav-link">Reports</a></li>
        <li class="nav-item"><a href="users.html" class="nav-link active">Users</a></li>
        <li class="nav-item"><a href="https://github.com/oumae3471-code/MAZURI-WASTE-MANAGEMENT-AND-CONTROL-SYSTEM" target="_blank" class="nav-link">Project Repo</a></li>
        <li class="nav-item"><a href="#" class="nav-link" onclick="logout()">Logout</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <h1>System Users</h1>

    <div id="alertContainer"></div>

    <div class="card">
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Role</th>
              <th>Department</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="7" class="text-center">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/app.bundle.js"></script>
  <script>
    async function loadUsers() {
      try {
        const response = await userService.getAll();
        const users = response.data || response || [];
        displayUsers(users);
      } catch (error) {
        showError('Failed to load users');
      }
    }

    function displayUsers(users) {
      const tbody = document.getElementById('usersBody');
      
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center">No users found</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(u => `
        <tr>
          <td>${u.firstName || '--'} ${u.lastName || '--'}</td>
          <td>${u.email || '--'}</td>
          <td>${u.phone || '--'}</td>
          <td>${u.role || '--'}</td>
          <td>${u.department || '--'}</td>
          <td>
            <span class="badge ${u.isActive ? 'badge-success' : 'badge-danger'}">
              ${u.isActive ? 'Active' : 'Inactive'}
            </span>
          </td>
          <td>
            <div class="actions">
              <button class="btn-primary btn-small" onclick="updateRole('${u._id || u.id}', '${u.role}')">Change Role</button>
              <button class="btn-danger btn-small" onclick="deleteUser('${u._id || u.id}')">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function updateRole(id, currentRole) {
      const newRole = prompt('Enter new role (admin, manager, collector, supervisor, viewer):', currentRole);
      if (!newRole) return;
      
      try {
        await userService.updateRole(id, newRole);
        showSuccess('User role updated');
        loadUsers();
      } catch (error) {
        showError('Failed to update user role');
      }
    }

    async function deleteUser(id) {
      if (!confirm('Delete this user?')) return;
      try {
        await userService.delete(id);
        showSuccess('User deleted');
        loadUsers();
      } catch (error) {
        showError('Failed to delete user');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!isLoggedIn()) window.location.href = 'login.html';
      loadUsers();
    });
  </script>
</body>
</html>
