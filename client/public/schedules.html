<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedules - Mazuri</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/navbar.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo"><a href="dashboard.html">Mazuri</a></div>
      <ul class="nav-menu">
        <li class="nav-item"><a href="dashboard.html" class="nav-link">Dashboard</a></li>
        <li class="nav-item"><a href="collections.html" class="nav-link">Collections</a></li>
        <li class="nav-item"><a href="schedules.html" class="nav-link active">Schedules</a></li>
        <li class="nav-item"><a href="disposal.html" class="nav-link">Disposal</a></li>
        <li class="nav-item"><a href="reports.html" class="nav-link">Reports</a></li>
        <li class="nav-item"><a href="users.html" class="nav-link">Users</a></li>
        <li class="nav-item"><a href="https://github.com/oumae3471-code/MAZURI-WASTE-MANAGEMENT-AND-CONTROL-SYSTEM" target="_blank" class="nav-link">Project Repo</a></li>
        <li class="nav-item"><a href="#" class="nav-link" onclick="logout()">Logout</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="flex-between mb-3">
      <h1>Collection Schedules</h1>
      <button class="btn-primary" onclick="toggleNewForm()">+ New Schedule</button>
    </div>

    <div id="alertContainer"></div>

    <div id="newFormContainer" class="card hidden">
      <div class="card-header"><h2>Create New Schedule</h2></div>
      <form id="newScheduleForm" onsubmit="handleNewSchedule(event)">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" required placeholder="Schedule title">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="startDate">Start Date</label>
            <input type="datetime-local" id="startDate" name="startDate" required>
          </div>
          <div class="form-group">
            <label for="endDate">End Date</label>
            <input type="datetime-local" id="endDate" name="endDate" required>
          </div>
        </div>

        <div class="form-group">
          <label for="location">Location</label>
          <input type="text" id="location" name="location" required placeholder="Schedule location">
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" placeholder="Schedule details"></textarea>
        </div>

        <div class="flex">
          <button type="submit" class="btn-primary">Create Schedule</button>
          <button type="button" class="btn-secondary" onclick="toggleNewForm()">Cancel</button>
        </div>
      </form>
    </div>

    <div class="card">
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Location</th>
              <th>Start Date</th>
              <th>End Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="schedulesBody">
            <tr><td colspan="6" class="text-center">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/app.bundle.js"></script>
  <script>
    function toggleNewForm() {
      document.getElementById('newFormContainer').classList.toggle('hidden');
    }

    async function loadSchedules() {
      try {
        const response = await scheduleService.getAll();
        const schedules = response.data || response || [];
        displaySchedules(schedules);
      } catch (error) {
        showError('Failed to load schedules');
      }
    }

    function displaySchedules(schedules) {
      const tbody = document.getElementById('schedulesBody');
      
      if (!schedules.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center">No schedules found</td></tr>';
        return;
      }

      tbody.innerHTML = schedules.map(s => `
        <tr>
          <td>${s.title || '--'}</td>
          <td>${s.location || '--'}</td>
          <td>${formatDate(s.startDate)}</td>
          <td>${formatDate(s.endDate)}</td>
          <td><span class="badge">${s.status || 'pending'}</span></td>
          <td>
            <div class="actions">
              <button class="btn-primary btn-small" onclick="updateStatus('${s._id || s.id}')">Update</button>
              <button class="btn-danger btn-small" onclick="deleteSchedule('${s._id || s.id}')">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function handleNewSchedule(e) {
      e.preventDefault();
      
      const formData = {
        title: document.getElementById('title').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        location: document.getElementById('location').value,
        description: document.getElementById('description').value,
        status: 'pending'
      };

      try {
        await scheduleService.create(formData);
        showSuccess('Schedule created successfully');
        toggleNewForm();
        document.getElementById('newScheduleForm').reset();
        loadSchedules();
      } catch (error) {
        showError(error.message || 'Failed to create schedule');
      }
    }

    async function updateStatus(id) {
      const newStatus = prompt('Enter new status (pending, in-progress, completed):', 'pending');
      if (!newStatus) return;
      
      try {
        await scheduleService.updateStatus(id, newStatus);
        showSuccess('Status updated');
        loadSchedules();
      } catch (error) {
        showError('Failed to update status');
      }
    }

    async function deleteSchedule(id) {
      if (!confirm('Delete this schedule?')) return;
      try {
        await scheduleService.delete(id);
        showSuccess('Schedule deleted');
        loadSchedules();
      } catch (error) {
        showError('Failed to delete schedule');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!isLoggedIn()) window.location.href = 'login.html';
      loadSchedules();
    });
  </script>
</body>
</html>
