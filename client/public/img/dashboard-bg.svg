<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients and patterns -->
  <defs>
    <!-- Main gradient background -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Green accent gradient -->
    <linearGradient id="greenAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.15" />
    </linearGradient>
    
    <!-- Animated shadow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="1920" height="1080" fill="url(#mainGradient)"/>
  
  <!-- Green accent overlay -->
  <rect width="1920" height="1080" fill="url(#greenAccent)"/>
  
  <!-- Large decorative shapes - blurred background elements -->
  
  <!-- Top left accent blob -->
  <ellipse cx="-200" cy="0" rx="400" ry="500" fill="#10b981" opacity="0.06" filter="url(#glow)"/>
  
  <!-- Top right accent blob -->
  <ellipse cx="2100" cy="-100" rx="500" ry="600" fill="#06b6d4" opacity="0.08" filter="url(#glow)"/>
  
  <!-- Bottom left accent blob -->
  <ellipse cx="-100" cy="1200" rx="450" ry="500" fill="#8b5cf6" opacity="0.07" filter="url(#glow)"/>
  
  <!-- Bottom right accent blob -->
  <ellipse cx="2000" cy="1100" rx="400" ry="450" fill="#10b981" opacity="0.06" filter="url(#glow)"/>
  
  <!-- Middle accent -->
  <ellipse cx="960" cy="540" rx="600" ry="300" fill="#06b6d4" opacity="0.04" filter="url(#glow)"/>
  
  <!-- Decorative geometric shapes -->
  
  <!-- Large circle - top right, subtle -->
  <circle cx="1750" cy="150" r="300" fill="#10b981" opacity="0.08"/>
  
  <!-- Medium circle - bottom left -->
  <circle cx="200" cy="950" r="250" fill="#06b6d4" opacity="0.07"/>
  
  <!-- Small circles scattered -->
  <circle cx="300" cy="300" r="80" fill="#8b5cf6" opacity="0.05"/>
  <circle cx="1600" cy="800" r="120" fill="#10b981" opacity="0.05"/>
  <circle cx="500" cy="700" r="100" fill="#06b6d4" opacity="0.04"/>
  <circle cx="1300" cy="200" r="90" fill="#8b5cf6" opacity="0.04"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.02"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  
  <!-- Horizontal lines for visual interest -->
  <line x1="0" y1="200" x2="1920" y2="200" stroke="#ffffff" stroke-width="1" opacity="0.03"/>
  <line x1="0" y1="400" x2="1920" y2="400" stroke="#ffffff" stroke-width="1" opacity="0.02"/>
  <line x1="0" y1="600" x2="1920" y2="600" stroke="#ffffff" stroke-width="1" opacity="0.02"/>
  <line x1="0" y1="800" x2="1920" y2="800" stroke="#ffffff" stroke-width="1" opacity="0.03"/>
  
  <!-- Waste management theme elements -->
  <!-- Trash bin silhouettes (very subtle) -->
  <g opacity="0.04" transform="translate(100, 100) scale(0.8)">
    <rect x="15" y="30" width="70" height="100" fill="#ffffff" rx="3"/>
    <path d="M 10 25 L 100 25 L 95 30 L 15 30 Z" fill="#ffffff"/>
    <line x1="30" y1="25" x2="30" y2="130" stroke="#ffffff" stroke-width="3"/>
    <line x1="50" y1="25" x2="50" y2="130" stroke="#ffffff" stroke-width="3"/>
    <line x1="70" y1="25" x2="70" y2="130" stroke="#ffffff" stroke-width="3"/>
  </g>
  
  <!-- Leaf/recycling symbol (very subtle) -->
  <g opacity="0.04" transform="translate(1800, 900) scale(1.2)">
    <circle cx="25" cy="25" r="20" fill="none" stroke="#ffffff" stroke-width="2"/>
    <path d="M 25 8 L 32 18 L 20 18 Z" fill="#ffffff"/>
    <path d="M 40 32 L 32 22 L 40 22 Z" fill="#ffffff" transform="rotate(120 25 25)"/>
    <path d="M 10 32 L 18 22 L 10 22 Z" fill="#ffffff" transform="rotate(240 25 25)"/>
  </g>
  
  <!-- Subtle wave pattern at bottom -->
  <path d="M 0 900 Q 480 950 960 900 T 1920 900 L 1920 1080 L 0 1080 Z" 
        fill="#ffffff" opacity="0.02"/>
  
  <!-- Vignette effect (subtle darkening at edges) -->
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.15" />
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
