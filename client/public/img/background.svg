<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.3" />
    </linearGradient>
    
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>
  
  <!-- Base background -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- Accent overlay -->
  <rect width="1920" height="1080" fill="url(#accentGradient)"/>
  
  <!-- Decorative circles - top right -->
  <circle cx="1800" cy="100" r="200" fill="#10b981" opacity="0.1"/>
  <circle cx="1700" cy="200" r="150" fill="#06b6d4" opacity="0.1"/>
  <circle cx="1900" cy="250" r="120" fill="#8b5cf6" opacity="0.1"/>
  
  <!-- Decorative circles - bottom left -->
  <circle cx="100" cy="900" r="250" fill="#10b981" opacity="0.15"/>
  <circle cx="200" cy="950" r="180" fill="#06b6d4" opacity="0.12"/>
  <circle cx="50" cy="800" r="140" fill="#8b5cf6" opacity="0.1"/>
  
  <!-- Waste management icons -->
  <!-- Trash bin icon 1 - top left -->
  <g opacity="0.08" transform="translate(150, 150)">
    <rect x="20" y="40" width="60" height="80" fill="#ffffff" rx="4"/>
    <rect x="15" y="35" width="70" height="8" fill="#ffffff"/>
    <line x1="35" y1="35" x2="35" y2="120" stroke="#ffffff" stroke-width="3"/>
    <line x1="50" y1="35" x2="50" y2="120" stroke="#ffffff" stroke-width="3"/>
    <line x1="65" y1="35" x2="65" y2="120" stroke="#ffffff" stroke-width="3"/>
  </g>
  
  <!-- Recycling icon - top right -->
  <g opacity="0.08" transform="translate(1700, 200)">
    <circle cx="50" cy="50" r="45" fill="none" stroke="#ffffff" stroke-width="4"/>
    <path d="M 50 15 L 60 35 L 45 35 Z" fill="#ffffff"/>
    <path d="M 85 65 L 75 45 L 90 45 Z" fill="#ffffff" transform="rotate(120 50 50)"/>
    <path d="M 15 65 L 25 45 L 10 45 Z" fill="#ffffff" transform="rotate(240 50 50)"/>
  </g>
  
  <!-- Leaf icon - bottom right -->
  <g opacity="0.08" transform="translate(1750, 850)">
    <path d="M 50 20 Q 60 40 50 80 Q 40 40 50 20" fill="#ffffff"/>
    <path d="M 50 20 Q 40 40 50 80 Q 60 40 50 20" fill="#ffffff" opacity="0.5"/>
    <line x1="50" y1="20" x2="50" y2="80" stroke="#ffffff" stroke-width="2"/>
  </g>
  
  <!-- Wave pattern - bottom -->
  <path d="M 0 850 Q 240 920 480 850 T 960 850 T 1440 850 T 1920 850 L 1920 1080 L 0 1080 Z" 
        fill="#ffffff" opacity="0.05"/>
  
  <!-- Dots pattern - top -->
  <g opacity="0.05">
    <circle cx="200" cy="100" r="3" fill="#ffffff"/>
    <circle cx="250" cy="150" r="3" fill="#ffffff"/>
    <circle cx="300" cy="100" r="3" fill="#ffffff"/>
    <circle cx="1700" cy="900" r="3" fill="#ffffff"/>
    <circle cx="1750" cy="950" r="3" fill="#ffffff"/>
    <circle cx="1800" cy="900" r="3" fill="#ffffff"/>
  </g>
  
  <!-- Grid pattern overlay -->
  <defs>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  
  <!-- Subtle vignette effect -->
  <defs>
    <radialGradient id="vignette">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.2" />
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
