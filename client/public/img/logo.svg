<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    
    <filter id="logoShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" filter="url(#logoShadow)"/>
  
  <!-- Trash bin (left) -->
  <g transform="translate(60, 80)">
    <rect x="5" y="15" width="20" height="30" fill="#ffffff" rx="2" opacity="0.9"/>
    <path d="M 3 12 L 27 12 L 25 15 L 5 15 Z" fill="#ffffff" opacity="0.9"/>
    <line x1="10" y1="12" x2="10" y2="45" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="15" y1="12" x2="15" y2="45" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="20" y1="12" x2="20" y2="45" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
  </g>
  
  <!-- Recycling symbol (right) -->
  <g transform="translate(110, 80)">
    <circle cx="15" cy="15" r="13" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <path d="M 15 4 L 19 11 L 12 11 Z" fill="#ffffff" opacity="0.9"/>
    <path d="M 26 22 L 20 14 L 24 14 Z" fill="#ffffff" opacity="0.9" transform="rotate(120 15 15)"/>
    <path d="M 4 22 L 10 14 L 6 14 Z" fill="#ffffff" opacity="0.9" transform="rotate(240 15 15)"/>
  </g>
  
  <!-- Leaf (center bottom) -->
  <g transform="translate(100, 130)">
    <path d="M 0 -15 Q 8 -5 8 10 Q -8 -5 0 -15" fill="#ffffff" opacity="0.8"/>
    <path d="M 0 -15 Q -8 -5 -8 10 Q 8 -5 0 -15" fill="#ffffff" opacity="0.5"/>
    <line x1="0" y1="-15" x2="0" y2="10" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  </g>
</svg>
